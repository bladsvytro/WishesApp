name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper jar
        run: gradle wrapper --gradle-version=8.9

      - name: Make gradlew executable
        run: chmod +x gradlew

      # google-services.json is committed to the repo (safe: it's embedded in the APK anyway)

      # Use release keystore if secret is set, otherwise generate a temporary one
      - name: Prepare release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > app/release.keystore
            cat > keystore.properties << EOF
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
            echo "Using release keystore from secret"
          else
            keytool -genkeypair -v -keystore app/release.keystore \
              -alias wishesapp -keyalg RSA -keysize 2048 -validity 365 \
              -dname "CN=WishesApp, O=WishesApp, C=RU" \
              -storepass android123 -keypass android123 2>/dev/null
            cat > keystore.properties << EOF
          storeFile=release.keystore
          storePassword=android123
          keyAlias=wishesapp
          keyPassword=android123
          EOF
            echo "Generated temporary keystore (no KEYSTORE_B64 secret)"
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName = ' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/WishesApp-${{ steps.version.outputs.name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Wishes ${{ steps.version.outputs.name }}"
          body: |
            ## Как установить
            1. Скачайте **WishesApp-${{ steps.version.outputs.name }}.apk** ниже
            2. Откройте файл на Android-телефоне
            3. Если появится запрос — разрешите установку из этого источника
            4. Нажмите «Установить»
          files: app/build/outputs/apk/release/WishesApp-${{ steps.version.outputs.name }}.apk
          draft: false
          prerelease: false

      - name: Update version.json on main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p docs
          cat > docs/version.json << EOF
          {
            "versionName": "${{ steps.version.outputs.name }}",
            "downloadUrl": "https://github.com/${{ github.repository }}/releases/latest/download/WishesApp-${{ steps.version.outputs.name }}.apk"
          }
          EOF
          git add docs/version.json
          git diff --staged --quiet || git commit -m "chore: bump version.json to ${{ steps.version.outputs.name }}"
          git push origin HEAD:main
